name: Performance Test

on:
  workflow_dispatch:
    inputs:
      tests:
        description: 'Comma-separated tests to run (create,getById,getByPath). Empty = all.'
        required: false
        default: ''

concurrency: perftest-${{ github.ref }}

jobs:
  ptest-content:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run ContentService benchmarks
        run: |
          ./gradlew :ptest:ptest-content:performanceTest \
            -Dperftest.tests='${{ inputs.tests }}'

      - name: Publish report to job summary
        if: always()
        run: |
          REPORT=modules/ptest/ptest-content/build/perftest-report/results.md
          if [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perftest-report
          path: modules/ptest/ptest-content/build/perftest-report/
          if-no-files-found: warn
