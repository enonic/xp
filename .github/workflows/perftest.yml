name: Performance Test

on:
  workflow_dispatch:

concurrency: perftest-${{ github.ref }}

jobs:
  ptest-content:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run JMH benchmarks
        run: ./gradlew :ptest:ptest-content:performanceTest

      - name: Publish report to job summary
        if: always()
        run: |
          REPORT_DIR=modules/ptest/ptest-content/build/perftest-report
          if [ -f "$REPORT_DIR/results.md" ]; then
            cat "$REPORT_DIR/results.md" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Raw JMH output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "$REPORT_DIR/results.txt" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perftest-report
          path: modules/ptest/ptest-content/build/perftest-report/
          if-no-files-found: warn
