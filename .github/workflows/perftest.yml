name: Performance Test

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Iteration count for ContentService.create'
        required: false
        default: '100000'
      warmup:
        description: 'Warmup iteration count'
        required: false
        default: '1000'

concurrency: perftest-${{ github.ref }}

jobs:
  ptest-content:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run ContentService.create benchmark
        run: |
          ./gradlew :ptest:ptest-content:performanceTest \
            -Dperftest.warmup=${{ inputs.warmup }} \
            -Dperftest.iterations=${{ inputs.iterations }}

      - name: Publish report to job summary
        if: always()
        run: |
          REPORT=modules/ptest/ptest-content/build/perftest-report/results.md
          if [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perftest-report
          path: modules/ptest/ptest-content/build/perftest-report/
          if-no-files-found: warn
