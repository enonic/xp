name: Release

on:
  push:
    tags:
      - 'v*'

concurrency: release

jobs:

  release_notes:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get previous release tag
        id: get_previous_release_tag
        run: |
          PREVIOUS_RELEASE_TAG=$(git tag --sort=-version:refname --merged | grep -E '^v([[:digit:]]+\.){2}[[:digit:]]+$' | grep -v "$(git describe --tags)" | head -1)
          echo "previous_release_tag=$PREVIOUS_RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        uses: enonic/release-tools/generate-changelog@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIOS_RELEASE_TAG: ${{ steps.get_previous_release_tag.outputs.previous_release_tag }}
          OUTPUT_FILE: changelog.md

      - uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: changelog.md

  build:
    runs-on: ubuntu-latest

    needs: release_notes

    permissions:
      contents: read

    outputs:
      packages: ${{ steps.stage_npm.outputs.packages }}
      version: ${{ steps.publish_vars.outputs.version }}
      tag_name: ${{ steps.publish_vars.outputs.tag_name }}
      prerelease: ${{ steps.publish_vars.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Get publishing variables
        id: publish_vars
        uses: enonic/release-tools/publish-vars@master
        env:
          PROPERTIES_PATH: './gradle.properties'

      - name: Verify release version
        if: steps.publish_vars.outputs.release != 'true'
        run: exit 1

      - name: Publish to Maven and Stage npm packages
        run: ./gradlew publish -PrepoKey=${{ steps.publish_vars.outputs.repo }} -PrepoUser=ci -PrepoPassword=${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Stage npm packages
        id: stage_npm
        run: |
          mkdir -p npm-staging
          names=()
          for dir in modules/lib/build/npm modules/lib/core/build/npm modules/lib/lib-*/build/npm; do
            [ -d "$dir" ] || continue
            short=$(jq -r .name "$dir/package.json" | sed 's|@enonic-types/||')
            cp -r "$dir" "npm-staging/$short"
            names+=("$short")
          done
          packages=$(printf '%s\n' "${names[@]}" | jq -R . | jq -s -c .)
          echo "packages=$packages" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: npm-staging
          if-no-files-found: error

  npm_publish:
    runs-on: ubuntu-latest

    needs: build

    permissions:
      id-token: write  # required for npm provenance

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.build.outputs.packages) }}

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v8
        with:
          name: npm-packages
          path: npm-staging

      - name: Publish @enonic-types/${{ matrix.package }}
        run: |
          DIR="./npm-staging/${{ matrix.package }}"
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            NPM_TAG=latest
          else
            NPM_TAG=beta
          fi
          npm publish "$DIR" --provenance --access public --tag "$NPM_TAG"

  release:
    runs-on: ubuntu-latest

    needs: build

    permissions:
      contents: write

    steps:
      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: changelog

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          body_path: changelog.md
          release_name: Enonic XP Runtime ${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
