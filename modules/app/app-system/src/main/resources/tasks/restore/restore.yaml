kind: "Task"
description: "Restore task"
form:
  - type: "TextLine"
    name: "snapshotName"
    label: "Snapshot name"
    occurrences:
      min: 0
      max: 1
  - type: "TextLine"
    name: "repositoryId"
    label: "Repository ID"
    occurrences:
      min: 0
      max: 1
  - type: "CheckBox"
    name: "latest"
    label: "Restore latest"
  - type: "CheckBox"
    name: "force"
    label: "Force restore"
