#
# Comma-separated wildcard patterns of URLs allowed for the /installUrl endpoint.
# A trailing * matches any suffix; otherwise the pattern is matched exactly.
# The default allows installs from the official Enonic repository only.
# Set to an empty string to disable /installUrl entirely.
#
# Examples:
#   installUrl.allowedUrls = https://repo.enonic.com/public/*, https://my.cdn.com/apps/*
#   installUrl.allowedUrls = http://*, https://*      # allow any http(s) URL
#
# installUrl.allowedUrls = https://repo.enonic.com/public/*

#
# When true (default), a SHA512 checksum is required for every /installUrl request.
# Set to false to allow installs without a checksum (not recommended).
#
# installUrl.checksumRequired = true
